name: pdns-portfolio

services:
  pdns-auth:
    image: powerdns/pdns-auth-50:latest
    container_name: pdns-auth
    restart: unless-stopped
    command: ["--config-dir=/etc/powerdns"]
    volumes:
      - ./configs/authoritative/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./configs/authoritative/named.conf:/etc/powerdns/named.conf:ro
      - ./zones:/etc/powerdns/zones:ro
    ports:
      - "5300:5300/tcp"
      - "5300:5300/udp"
      - "8081:8081/tcp"
    networks:
      pdns_net:
        ipv4_address: 172.30.0.10

  pdns-recursor:
    image: powerdns/pdns-recursor-50:latest
    container_name: pdns-recursor
    restart: unless-stopped
    command: ["--config-dir=/etc/powerdns"]
    depends_on:
      - pdns-auth
    volumes:
      - ./configs/recursor/recursor.conf:/etc/powerdns/recursor.conf:ro
    ports:
      - "1053:5301/tcp"
      - "1053:5301/udp"
    networks:
      pdns_net:
        ipv4_address: 172.30.0.11

networks:
  pdns_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

